<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <!-- Background decorative circles -->
  <circle cx="250" cy="250" r="240" fill="#F0FDFA" opacity="0.5"/>
  <circle cx="250" cy="250" r="180" fill="#CCFBF1" opacity="0.3"/>
  
  <!-- Doctor figure -->
  <g transform="translate(125, 60)">
    <!-- White coat body -->
    <rect x="55" y="120" width="140" height="200" rx="16" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
    <!-- Coat lapels -->
    <path d="M125 120 L125 320" stroke="#E5E7EB" stroke-width="1.5"/>
    <path d="M95 120 L95 320" stroke="#E5E7EB" stroke-width="1.5"/>
    
    <!-- Head -->
    <circle cx="125" cy="65" r="55" fill="#FEF3C7"/>
    <!-- Hair -->
    <path d="M70 50 Q70 10 125 5 Q180 10 180 50" fill="#1F2937"/>
    <!-- Eyes -->
    <ellipse cx="105" cy="62" rx="6" ry="7" fill="#1F2937"/>
    <ellipse cx="145" cy="62" rx="6" ry="7" fill="#1F2937"/>
    <!-- Smile -->
    <path d="M105 85 Q125 105 145 85" stroke="#1F2937" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    
    <!-- Stethoscope -->
    <path d="M125 120 L125 170 Q125 190 105 190 Q85 190 85 170" stroke="#14B8A6" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M125 120 L125 170 Q125 190 145 190 Q165 190 165 170" stroke="#14B8A6" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <circle cx="85" cy="170" r="10" fill="none" stroke="#14B8A6" stroke-width="3"/>
    <circle cx="165" cy="170" r="10" fill="none" stroke="#14B8A6" stroke-width="3"/>
    
    <!-- Clipboard -->
    <rect x="195" y="155" width="45" height="60" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
    <line x1="205" y1="172" x2="230" y2="172" stroke="#D1D5DB" stroke-width="1.5"/>
    <line x1="205" y1="182" x2="230" y2="182" stroke="#D1D5DB" stroke-width="1.5"/>
    <line x1="205" y1="192" x2="222" y2="192" stroke="#D1D5DB" stroke-width="1.5"/>
  </g>

  <!-- Heart rate monitor -->
  <g transform="translate(60, 340)">
    <path d="M0 50 L80 50 L110 50 L125 15 L140 85 L155 15 L170 85 L185 15 L200 50 L240 50 L320 50" 
          stroke="#14B8A6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Medical cross (decorative) -->
  <g transform="translate(380, 80)" opacity="0.25">
    <rect x="22" y="0" width="16" height="60" rx="4" fill="#14B8A6"/>
    <rect x="0" y="22" width="60" height="16" rx="4" fill="#14B8A6"/>
  </g>

  <!-- Pill icons (decorative) -->
  <g transform="translate(370, 350)" opacity="0.2">
    <rect x="0" y="8" width="50" height="20" rx="10" fill="#2563EB"/>
    <rect x="25" y="8" width="25" height="20" rx="10" fill="#2563EB" opacity="0.5"/>
  </g>

  <!-- Heart icon (decorative) -->
  <g transform="translate(50, 80)" opacity="0.2">
    <path d="M25 12 C25 0 45 -6 50 6 C55 -6 75 0 75 12 L50 42 L25 12Z" fill="#EF4444"/>
  </g>

  <!-- Decorative dots pattern -->
  <g opacity="0.08">
    <circle cx="420" cy="180" r="3" fill="#14B8A6"/>
    <circle cx="440" cy="200" r="2" fill="#14B8A6"/>
    <circle cx="410" cy="210" r="2.5" fill="#14B8A6"/>
    <circle cx="80" cy="420" r="3" fill="#14B8A6"/>
    <circle cx="60" cy="440" r="2" fill="#14B8A6"/>
    <circle cx="100" cy="435" r="2.5" fill="#14B8A6"/>
  </g>
</svg>
